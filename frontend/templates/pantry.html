<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Pantry - Kitchen Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Roboto Mono', monospace;
        }

        .card-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gray-800 text-white min-h-screen p-6">
    <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
        <h1 class="text-3xl font-bold text-yellow-500">KITCHEN DISPLAY</h1>
        <div class="flex items-center gap-4">
            <div class="test-sm text-gray-400 font-mono" id="clock">00:00:00</div>
        </div>
    </header>

    <!-- Auto-Activation Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex flex-col items-center justify-center text-center p-6">
        <div class="max-w-md">
            <div class="text-6xl mb-6">📢</div>
            <h2 class="text-4xl font-bold text-yellow-500 mb-4">KITCHEN READY</h2>
            <p class="text-xl text-gray-300 mb-8 px-4">Tap anywhere to start audio and voice notifications</p>
            <button onclick="startKitchen()" class="bg-green-600 hover:bg-green-700 text-white text-2xl font-black py-6 px-12 rounded-full shadow-2xl transition transform hover:scale-105 uppercase tracking-widest">
                START NOW
            </button>
        </div>
    </div>

    <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Orders injected here -->
    </div>

    <!-- Push Notification Subscription Button -->


    <script src="/static/js/pantry.js"></script>
    <script src="/static/js/push_client.js"></script>
</body>

</html>
